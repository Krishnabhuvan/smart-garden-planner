---
- name: Deploy Smart Garden Planner
  hosts: azure
  gather_facts: false

  vars:
    image: smartgardenacr.azurecr.io/smart-garden:latest
    container_name: smart-garden-app
    acr_name: smartgardenacr

  tasks:
    - name: Login to Azure
      command: az login --service-principal
        -u "{{ lookup('env', 'AZURE_CLIENT_ID') }}"
        -p "{{ lookup('env', 'AZURE_CLIENT_SECRET') }}"
        --tenant "{{ lookup('env', 'AZURE_TENANT_ID') }}"

    - name: Login to ACR
      command: >
        az acr login --name {{ acr_name }}
        --expose-token

    - name: Pull latest Docker image
      command: docker pull {{ image }}

    - name: Stop existing container
      command: >
        az container delete
        --name {{ container_name }}
        --resource-group smart-garden-rg
        --yes
      ignore_errors: true

    - name: Deploy new container
      command: >
        az container create
        --resource-group smart-garden-rg
        --name {{ container_name }}
        --image {{ image }}
        --registry-login-server smartgardenacr.azurecr.io
        --registry-username {{ lookup('env', 'ACR_USERNAME') }}
        --registry-password {{ lookup('env', 'ACR_PASSWORD') }}
        --dns-name-label smart-garden-app
        --ports 8000
        --environment-variables
          GROQ_API_KEY="{{ lookup('env', 'GROQ_API_KEY') }}"
          MONGO_URL="{{ lookup('env', 'MONGO_URL') }}"
        --os-type Linux
        --cpu 1
        --memory 2

    - name: Show app URL
      debug:
        msg: "App is live at http://smart-garden-app.centralindia.azurecontainer.io:8000"